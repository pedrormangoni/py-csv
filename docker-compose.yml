services:

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: ./csv-ingestion
    container_name: python_app
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./csv-ingestion:/app
    command: python main.py

volumes:
  postgres_data:
